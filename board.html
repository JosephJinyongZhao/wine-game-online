<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>调酒商业模拟 - 排行榜</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:16px;scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#0a1628 0%,#1a2744 50%,#0a1628 100%);color:#c8d8f0;line-height:1.5;min-height:100vh;padding-bottom:24px}
  .container{max-width:520px;margin:0 auto;padding:16px}
  h1{text-align:center;font-size:1.3rem;margin-bottom:4px;background:linear-gradient(90deg,#65c8f6,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .subtitle{text-align:center;font-size:.75rem;color:#4a6a8a;margin-bottom:16px}
  .round-tabs{display:flex;gap:6px;margin-bottom:16px;justify-content:center;flex-wrap:wrap}
  .round-tab{padding:8px 14px;border-radius:20px;font-size:.78rem;font-weight:600;cursor:pointer;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#4a6a8a;transition:all .2s}
  .round-tab.active{background:rgba(101,200,246,.15);border-color:#65c8f6;color:#65c8f6}
  .round-tab.total{border-color:rgba(251,191,36,.3);color:#fbbf24}
  .round-tab.total.active{background:rgba(251,191,36,.15);border-color:#fbbf24;color:#fbbf24}

  .rank-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .2s}
  .rank-card:active{background:rgba(255,255,255,.08)}
  .rank-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;flex-shrink:0}
  .rn-1{background:linear-gradient(135deg,#f6d365,#fda085);color:#1a0a2e}
  .rn-2{background:linear-gradient(135deg,#a8a8a8,#c0c0c0);color:#333}
  .rn-3{background:linear-gradient(135deg,#cd7f32,#daa520);color:#333}
  .rn-other{background:rgba(255,255,255,.08);color:#4a6a8a}
  .rank-info{flex:1;min-width:0}
  .rank-team{font-size:.9rem;font-weight:600;color:#e8d5f5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rank-detail{font-size:.72rem;color:#4a6a8a;margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
  .rank-detail span{white-space:nowrap}
  .rank-score{text-align:right;flex-shrink:0}
  .score-main{font-size:1.2rem;font-weight:700;color:#65c8f6}
  .score-label{font-size:.65rem;color:#4a6a8a}
  .score-sub{font-size:.68rem;color:#6a8aaa;margin-top:1px}

  /* 详情面板 */
  .detail-panel{display:none;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;margin:-4px 0 10px 0}
  .detail-panel.show{display:block}
  .detail-panel h3{font-size:.85rem;color:#f6d365;margin-bottom:10px}
  .detail-row{display:flex;justify-content:space-between;font-size:.78rem;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)}
  .detail-row:last-child{border-bottom:none}
  .detail-row .dl{color:#4a6a8a}
  .detail-row .dv{color:#c8d8f0;font-weight:500}
  .profit-section{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.1)}
  .profit-row{display:flex;justify-content:space-between;font-size:.82rem;padding:3px 0}
  .profit-row .pl{color:#6a8aaa}
  .profit-row .pv{font-weight:700}
  .profit-row .pv.pos{color:#81c784}
  .profit-row .pv.neg{color:#ff6b6b}

  /* 总排名特殊样式 */
  .total-profit{font-size:.82rem;color:#fbbf24;font-weight:700;margin-left:4px}

  .empty{text-align:center;padding:40px 20px;color:#4a6a8a}
  .empty p{margin-top:8px;font-size:.82rem}
  .refresh-btn{position:fixed;bottom:20px;right:20px;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#65c8f6,#a78bfa);border:none;color:#fff;font-size:18px;cursor:pointer;box-shadow:0 4px 12px rgba(101,200,246,.3)}
  .nav-links{display:flex;gap:8px;margin-bottom:14px}
  .nav-links a{flex:1;text-align:center;padding:10px;border-radius:8px;font-size:.82rem;font-weight:600;text-decoration:none;color:#c8d8f0;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}
  .nav-links a.active{background:rgba(101,200,246,.15);border-color:#65c8f6;color:#65c8f6}
  .auto-refresh{text-align:center;font-size:.7rem;color:#4a6a8a;margin-bottom:10px}
</style>
</head>
<body>

<div class="container">
  <h1>🏆 调酒商业模拟</h1>
  <p class="subtitle">实时排行榜 · 三轮总排名</p>

  <div class="nav-links">
    <a href="wine-game-v4-online.html">📝 提交</a>
    <a href="#" class="active">🏆 排行榜</a>
    <a href="wine-game-judge.html">👑 庄主</a>
  </div>

  <div class="round-tabs">
    <div class="round-tab active" onclick="switchView('round',1)">第1轮</div>
    <div class="round-tab" onclick="switchView('round',2)">第2轮</div>
    <div class="round-tab" onclick="switchView('round',3)">第3轮</div>
    <div class="round-tab total" onclick="switchView('total')">🏅 总排名</div>
  </div>

  <div class="auto-refresh">🔄 每30秒自动刷新</div>
  <div id="rankList"></div>
  <div id="detailContainer"></div>
</div>

<button class="refresh-btn" onclick="loadData()">🔄</button>

<script>
const SUPABASE_URL = 'https://br-super-bril-5b7143a3.supabase.aidap-global.cn-beijing.volces.com';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1wbGF0Zm9ybSIsInJvbGUiOiJhbm9uIiwiZXhwIjozNjgwMzAwODk3fQ.iQvJdU1h7O0HqW_QK9U-LrEL4iz2j2uwL3HYaXTS1z0';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const COST_XDL=3, COST_HPN=7, COST_MSL=4.8, COST_RATIO=0.4, RETAIL_MULT=3;

let viewMode = 'round'; // 'round' or 'total'
let currentRound = 1;
let allData = [];
let expandedIdx = -1;

function switchView(mode, round) {
  viewMode = mode;
  if (round) currentRound = round;
  document.querySelectorAll('.round-tab').forEach((el, i) => {
    if (i < 3) el.classList.toggle('active', mode==='round' && i+1===currentRound);
    else el.classList.toggle('active', mode==='total');
  });
  expandedIdx = -1;
  document.getElementById('detailContainer').innerHTML = '';
  renderRanking();
}

async function loadData() {
  // 加载所有数据
  const { data, error } = await supabase
    .from('submissions')
    .select('*, teams(name)')
    .order('submitted_at', { ascending: true });

  if (error) {
    document.getElementById('rankList').innerHTML = `<div class="empty"><p>加载失败：${error.message}</p></div>`;
    return;
  }

  allData = data || [];
  renderRanking();
}

function calcMetrics(d) {
  const xdl=d.cabernet_ml||0, hpn=d.marselan_ml||0, msl=d.syrah_ml||0;
  const cost = xdl/100*COST_XDL + hpn/100*COST_HPN + msl/100*COST_MSL;
  const factory = cost / COST_RATIO;
  const retail = factory * RETAIL_MULT;
  const hasBrand = d.brand_score !== null && d.brand_score > 0;
  const avg = hasBrand ? (d.risk_score + d.pricing_score + d.brand_score)/3 : null;
  const demand = avg !== null ? Math.round(avg * 100) : null;
  let feeRate=null, netProfit=null, operProfit=null, grossProfit=null;
  if (hasBrand && demand !== null) {
    const priceRatio = retail > 0 ? d.my_price / retail : 1;
    const feeRandom = d.pricing_self_score || 0;
    feeRate = Math.max(0.70, Math.min(0.95, 0.85 + 0.08*(priceRatio-1) - 0.015*d.brand_score + feeRandom));
    grossProfit = (d.my_price - cost) * demand;
    operProfit = (d.my_price - factory) * demand;
    netProfit = operProfit * (1 - feeRate);
  }
  return { cost, factory, retail, avg, demand, feeRate, netProfit, operProfit, grossProfit };
}

function renderRanking() {
  const list = document.getElementById('rankList');

  if (allData.length === 0) {
    list.innerHTML = '<div class="empty"><p>🍷 暂无数据</p><p>等待各队提交决策...</p></div>';
    return;
  }

  if (viewMode === 'round') {
    const roundData = allData.filter(d => d.round === currentRound);
    if (roundData.length === 0) {
      list.innerHTML = `<div class="empty"><p>🍷 第${currentRound}轮暂无数据</p></div>`;
      return;
    }
    // 按净利润排序（有分数的在前，没分数的在后）
    const enriched = roundData.map((d, i) => ({ ...d, metrics: calcMetrics(d), origIdx: allData.indexOf(d) }));
    const scored = enriched.filter(d => d.metrics.avg !== null).sort((a,b) => b.metrics.netProfit - a.metrics.netProfit);
    const unscored = enriched.filter(d => d.metrics.avg === null);
    const sorted = [...scored, ...unscored];
    renderList(sorted, 'round');
  } else {
    // 总排名：汇总三轮净利润
    const teamMap = {};
    allData.forEach((d, i) => {
      const teamName = d.teams?.name || '未知';
      if (!teamMap[teamName]) teamMap[teamName] = { name: teamName, rounds: [], totalProfit: 0, hasAnyScore: false };
      const m = calcMetrics(d);
      teamMap[teamName].rounds.push({ data: d, metrics: m, idx: i });
      if (m.netProfit !== null) {
        teamMap[teamName].totalProfit += m.netProfit;
        teamMap[teamName].hasAnyScore = true;
      }
    });
    const teams = Object.values(teamMap).sort((a,b) => {
      if (a.hasAnyScore && !b.hasAnyScore) return -1;
      if (!a.hasAnyScore && b.hasAnyScore) return 1;
      return b.totalProfit - a.totalProfit;
    });
    renderTotalList(teams);
  }
}

function renderList(sorted, mode) {
  const medals = ['🥇','🥈','🥉'];
  const rnClasses = ['rn-1','rn-2','rn-3'];
  const list = document.getElementById('rankList');

  list.innerHTML = sorted.map((d, i) => {
    const rankClass = i < 3 ? rnClasses[i] : 'rn-other';
    const hasScore = d.metrics.avg !== null;
    const scoreText = hasScore ? d.metrics.avg.toFixed(1) : '待评';
    const profitText = hasScore ? `${d.metrics.netProfit.toFixed(0)}元` : '--';
    const profitClass = hasScore ? (d.metrics.netProfit >= 0 ? 'pos' : 'neg') : '';
    const statusText = d.status === 'scored' ? '✅' : '📝';
    const globalIdx = d.origIdx;

    return `
    <div>
      <div class="rank-card" onclick="toggleDetail(${i})">
        <div class="rank-num ${rankClass}">${hasScore && i<3 ? medals[i] : i+1}</div>
        <div class="rank-info">
          <div class="rank-team">${d.teams?.name||'未知'} · ${d.wine_name} ${statusText}</div>
          <div class="rank-detail">
            <span>风险${d.risk_score?.toFixed(1)||'--'}</span>
            <span>定价${d.pricing_score?.toFixed(1)||'--'}</span>
            <span>品牌${d.brand_score?.toFixed(1)||'--'}</span>
            <span>${d.my_price}元</span>
          </div>
        </div>
        <div class="rank-score">
          <div class="score-main">${scoreText}</div>
          <div class="score-label">均分</div>
          <div class="score-sub">${profitText}</div>
        </div>
      </div>
      <div class="detail-panel" id="detail_${i}"></div>
    </div>`;
  }).join('');

  window._sorted = sorted;
}

function renderTotalList(teams) {
  const medals = ['🥇','🥈','🥉'];
  const rnClasses = ['rn-1','rn-2','rn-3'];
  const list = document.getElementById('rankList');

  list.innerHTML = '<h3 style="text-align:center;color:#fbbf24;font-size:.9rem;margin-bottom:12px">🏅 三轮累计利润排名</h3>' +
  teams.map((t, i) => {
    const rankClass = i < 3 ? rnClasses[i] : 'rn-other';
    const profitStr = t.hasAnyScore ? t.totalProfit.toFixed(0) + '元' : '待评分';
    const profitClass = t.hasAnyScore ? (t.totalProfit >= 0 ? 'pos' : 'neg') : '';
    const roundsInfo = t.rounds.map(r => {
      const m = r.metrics;
      return `R${r.data.round}: ${m.netProfit !== null ? m.netProfit.toFixed(0)+'元' : '待评'}`;
    }).join(' | ');

    return `
    <div>
      <div class="rank-card" onclick="toggleTotalDetail(${i})">
        <div class="rank-num ${rankClass}">${t.hasAnyScore && i<3 ? medals[i] : i+1}</div>
        <div class="rank-info">
          <div class="rank-team">${t.name}</div>
          <div class="rank-detail"><span>${roundsInfo}</span></div>
        </div>
        <div class="rank-score">
          <div class="score-main" style="color:#fbbf24">${t.hasAnyScore ? t.totalProfit.toFixed(0) : '--'}</div>
          <div class="score-label">总利润(元)</div>
        </div>
      </div>
      <div class="detail-panel" id="total_detail_${i}"></div>
    </div>`;
  }).join('');

  window._teams = teams;
}

function toggleDetail(idx) {
  const panel = document.getElementById('detail_' + idx);
  if (panel.classList.contains('show')) {
    panel.classList.remove('show');
    return;
  }
  document.querySelectorAll('.detail-panel').forEach(p => p.classList.remove('show'));
  const d = window._sorted[idx];
  const m = d.metrics;
  const hasScore = m.avg !== null;

  let profitHtml = '';
  if (hasScore) {
    profitHtml = `
    <div class="profit-section">
      <div class="profit-row"><span class="pl">市场需求</span><span class="pv">${m.demand} 瓶</span></div>
      <div class="profit-row"><span class="pl">毛利</span><span class="pv ${m.grossProfit>=0?'pos':'neg'}">${m.grossProfit.toFixed(0)} 元</span></div>
      <div class="profit-row"><span class="pl">经营利润</span><span class="pv ${m.operProfit>=0?'pos':'neg'}">${m.operProfit.toFixed(0)} 元</span></div>
      <div class="profit-row"><span class="pl">费用率</span><span class="pv">${(m.feeRate*100).toFixed(1)}%</span></div>
      <div class="profit-row"><span class="pl">净利润</span><span class="pv ${m.netProfit>=0?'pos':'neg'}">${m.netProfit.toFixed(0)} 元</span></div>
    </div>`;
  }

  panel.innerHTML = `
    <h3>${d.teams?.name||'未知'} · ${d.wine_name}</h3>
    <div class="detail-row"><span class="dl">配方</span><span class="dv">赤${d.cabernet_ml}/马${d.marselan_ml}/西${d.syrah_ml} ml</span></div>
    <div class="detail-row"><span class="dl">基酒成本</span><span class="dv">${m.cost.toFixed(2)} 元</span></div>
    <div class="detail-row"><span class="dl">出厂价</span><span class="dv">${m.factory.toFixed(1)} 元</span></div>
    <div class="detail-row"><span class="dl">建议零售价</span><span class="dv">${m.retail.toFixed(0)} 元</span></div>
    <div class="detail-row"><span class="dl">我的定价</span><span class="dv" style="color:#f6d365">${d.my_price} 元</span></div>
    <div class="detail-row"><span class="dl">定位</span><span class="dv">${d.positioning||'--'}</span></div>
    <div class="detail-row"><span class="dl">品牌故事</span><span class="dv">${d.brand_story||'--'}</span></div>
    <div class="detail-row"><span class="dl">风险创新分</span><span class="dv">${d.risk_score?.toFixed(1)||'--'} (自动)</span></div>
    <div class="detail-row"><span class="dl">定价合理分</span><span class="dv">${d.pricing_score?.toFixed(1)||'--'} (自动)</span></div>
    <div class="detail-row"><span class="dl">品牌分</span><span class="dv">${d.brand_score?.toFixed(1)||'待评'}</span></div>
    ${hasScore ? `<div class="detail-row"><span class="dl">平均分</span><span class="dv" style="color:#65c8f6;font-weight:700">${m.avg.toFixed(1)}</span></div>` : ''}
    ${profitHtml}
  `;
  panel.classList.add('show');
}

function toggleTotalDetail(idx) {
  const panel = document.getElementById('total_detail_' + idx);
  if (panel.classList.contains('show')) {
    panel.classList.remove('show');
    return;
  }
  document.querySelectorAll('.detail-panel').forEach(p => p.classList.remove('show'));
  const t = window._teams[idx];

  let roundsHtml = t.rounds.map(r => {
    const m = r.metrics;
    const hasScore = m.avg !== null;
    return `
    <div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)">
      <div style="font-size:.78rem;color:#65c8f6;font-weight:600;margin-bottom:4px">第${r.data.round}轮：${r.data.wine_name}</div>
      <div class="detail-row"><span class="dl">配方</span><span class="dv">赤${r.data.cabernet_ml}/马${r.data.marselan_ml}/西${r.data.syrah_ml} ml</span></div>
      <div class="detail-row"><span class="dl">定价</span><span class="dv">${r.data.my_price} 元</span></div>
      <div class="detail-row"><span class="dl">风险/定价/品牌</span><span class="dv">${r.data.risk_score?.toFixed(1)||'-'}/${r.data.pricing_score?.toFixed(1)||'-'}/${r.data.brand_score?.toFixed(1)||'-'}</span></div>
      ${hasScore ? `<div class="detail-row"><span class="dl">净利润</span><span class="dv ${m.netProfit>=0?'pos':'neg'}" style="color:${m.netProfit>=0?'#81c784':'#ff6b6b'}">${m.netProfit.toFixed(0)} 元</span></div>` : '<div class="detail-row"><span class="dl">状态</span><span class="dv" style="color:#e65100">待评分</span></div>'}
    </div>`;
  }).join('');

  panel.innerHTML = `
    <h3>${t.name}</h3>
    <div class="profit-row"><span class="pl">三轮总利润</span><span class="pv" style="color:#fbbf24;font-size:1rem">${t.hasAnyScore ? t.totalProfit.toFixed(0)+' 元' : '--'}</span></div>
    ${roundsHtml}
  `;
  panel.classList.add('show');
}

// 初始加载
loadData();

// 自动刷新
setInterval(loadData, 30000);
</script>
</body>
</html>
