<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>调酒商业模拟 - 庄主打分</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:16px;scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#0a1628 0%,#1a2744 50%,#0a1628 100%);color:#c8d8f0;line-height:1.5;min-height:100vh;padding-bottom:24px}
  .container{max-width:520px;margin:0 auto;padding:16px}
  h1{text-align:center;font-size:1.3rem;margin-bottom:4px;background:linear-gradient(90deg,#f6d365,#fda085);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .subtitle{text-align:center;font-size:.75rem;color:#4a6a8a;margin-bottom:16px}
  /* 登录 */
  .login-overlay{position:fixed;inset:0;background:rgba(10,22,40,.95);z-index:200;display:flex;align-items:center;justify-content:center}
  .login-overlay.hide{display:none}
  .login-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:30px 24px;width:90%;max-width:360px;text-align:center}
  .login-box h2{color:#f6d365;font-size:1.1rem;margin-bottom:16px}
  .login-box input{width:100%;padding:12px;border:1px solid rgba(255,255,255,.15);border-radius:10px;background:rgba(255,255,255,.08);color:#fff;font-size:1rem;text-align:center;margin-bottom:12px;outline:none}
  .login-box input:focus{border-color:#f6d365}
  .login-box button{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#f6d365,#fda085);color:#1a0a2e;font-size:1rem;font-weight:700;cursor:pointer}
  .login-box .err{color:#ff6b6b;font-size:.8rem;margin-top:8px;display:none}
  /* 轮次tabs */
  .round-tabs{display:flex;gap:8px;margin-bottom:16px;justify-content:center}
  .round-tab{padding:8px 16px;border-radius:20px;font-size:.82rem;font-weight:600;cursor:pointer;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#4a6a8a;transition:all .2s}
  .round-tab.active{background:rgba(246,211,101,.15);border-color:#f6d365;color:#f6d365}
  /* 队伍卡片 */
  .team-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;margin-bottom:12px}
  .team-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .team-name{font-size:1rem;font-weight:700;color:#f6d365}
  .team-status{font-size:.72rem;padding:3px 8px;border-radius:6px;font-weight:600}
  .team-status.submitted{background:rgba(255,193,7,.15);color:#ffc107}
  .team-status.scored{background:rgba(76,175,80,.15);color:#81c784}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
  .detail-item{font-size:.78rem;padding:6px 8px;background:rgba(255,255,255,.03);border-radius:6px}
  .detail-item .dl{color:#4a6a8a;font-size:.68rem}
  .detail-item .dv{color:#c8d8f0;font-weight:500}
  .brand-section{background:rgba(255,255,255,.03);border-radius:8px;padding:10px;margin-bottom:12px}
  .brand-section h4{font-size:.78rem;color:#a78bfa;margin-bottom:6px}
  .brand-section p{font-size:.78rem;color:#8a9ab5;line-height:1.5}
  .score-input-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid rgba(255,255,255,.06)}
  .score-input-row label{font-size:.82rem;color:#c8d8f0;font-weight:600;white-space:nowrap}
  .score-input-row input[type="number"]{width:70px;padding:8px;border:1px solid rgba(255,255,255,.15);border-radius:8px;background:rgba(255,255,255,.08);color:#f6d365;font-size:1rem;font-weight:700;text-align:center;outline:none}
  .score-input-row input:focus{border-color:#f6d365}
  .score-input-row .save-btn{padding:8px 16px;border:none;border-radius:8px;background:linear-gradient(135deg,#f6d365,#fda085);color:#1a0a2e;font-size:.82rem;font-weight:700;cursor:pointer;white-space:nowrap}
  .score-input-row .save-btn:disabled{opacity:.5;cursor:not-allowed}
  .score-input-row .auto-scores{font-size:.72rem;color:#4a6a8a;flex:1}
  .score-input-row .auto-scores span{color:#81c784;font-weight:600}
  /* 排名 */
  .rank-section{margin-top:20px}
  .rank-section h3{text-align:center;font-size:.9rem;color:#f6d365;margin-bottom:12px}
  .rank-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.03);border-radius:10px;margin-bottom:6px}
  .rank-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;flex-shrink:0}
  .rank-1{background:linear-gradient(135deg,#f6d365,#fda085);color:#1a0a2e}
  .rank-2{background:linear-gradient(135deg,#a8a8a8,#c0c0c0);color:#333}
  .rank-3{background:linear-gradient(135deg,#cd7f32,#daa520);color:#333}
  .rank-other{background:rgba(255,255,255,.08);color:#4a6a8a}
  .rank-info{flex:1}
  .rank-team{font-size:.85rem;font-weight:600;color:#e8d5f5}
  .rank-detail{font-size:.7rem;color:#4a6a8a}
  .rank-profit{text-align:right;font-size:.9rem;font-weight:700}
  .rank-profit.pos{color:#81c784}
  .rank-profit.neg{color:#ff6b6b}
  .empty{text-align:center;padding:40px 20px;color:#4a6a8a}
  .btn-row{display:flex;gap:8px;margin-top:16px}
  .btn-row button{flex:1;padding:12px;border:none;border-radius:10px;font-size:.85rem;font-weight:600;cursor:pointer}
  .btn-refresh{background:rgba(255,255,255,.08);color:#c8d8f0;border:1px solid rgba(255,255,255,.1)}
  .btn-nav{background:rgba(167,139,250,.15);color:#a78bfa;border:1px solid rgba(167,139,250,.2)}
</style>
</head>
<body>

<!-- 登录 -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>👑 庄主登录</h2>
    <input type="password" id="loginPwd" placeholder="输入庄主密码" onkeypress="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">登录</button>
    <p class="err" id="loginErr">密码错误</p>
  </div>
</div>

<div class="container">
  <h1>👑 庄主打分台</h1>
  <p class="subtitle">查看各队提交内容 · 给品牌分</p>

  <div class="round-tabs">
    <div class="round-tab active" onclick="switchRound(1)">第1轮</div>
    <div class="round-tab" onclick="switchRound(2)">第2轮</div>
    <div class="round-tab" onclick="switchRound(3)">第3轮</div>
  </div>

  <div id="teamList"></div>

  <div class="rank-section" id="rankSection" style="display:none">
    <h3>🏅 当前轮次排名</h3>
    <div id="rankList"></div>
  </div>

  <div class="btn-row">
    <button class="btn-refresh" onclick="loadSubmissions()">🔄 刷新数据</button>
    <button class="btn-nav" onclick="window.location.href='wine-game-board.html'">🏆 排行榜</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://br-super-bril-5b7143a3.supabase.aidap-global.cn-beijing.volces.com';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1wbGF0Zm9ybSIsInJvbGUiOiJhbm9uIiwiZXhwIjozNjgwMzAwODk3fQ.iQvJdU1h7O0HqW_QK9U-LrEL4iz2j2uwL3HYaXTS1z0';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const JUDGE_PWD = 'wine2026';
const COST_XDL=3, COST_HPN=7, COST_MSL=4.8, COST_RATIO=0.4, RETAIL_MULT=3;

let currentRound = 1;
let submissionsData = [];

function doLogin() {
  const pwd = document.getElementById('loginPwd').value;
  if (pwd === JUDGE_PWD) {
    document.getElementById('loginOverlay').classList.add('hide');
    loadSubmissions();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

function switchRound(r) {
  currentRound = r;
  document.querySelectorAll('.round-tab').forEach((el,i) => el.classList.toggle('active', i+1===r));
  loadSubmissions();
}

async function loadSubmissions() {
  const list = document.getElementById('teamList');
  list.innerHTML = '<div class="empty">加载中...</div>';

  const { data, error } = await supabase
    .from('submissions')
    .select('*, teams(name)')
    .eq('round', currentRound)
    .order('submitted_at', { ascending: true });

  if (error) {
    list.innerHTML = `<div class="empty">加载失败：${error.message}</div>`;
    return;
  }

  if (!data || data.length === 0) {
    list.innerHTML = '<div class="empty"><p>🍷 暂无提交</p><p>等待队伍提交决策...</p></div>';
    document.getElementById('rankSection').style.display = 'none';
    return;
  }

  submissionsData = data;
  renderTeams(data);
  renderRanking(data);
}

function renderTeams(data) {
  const list = document.getElementById('teamList');
  list.innerHTML = data.map((item, idx) => {
    const totalMl = (item.cabernet_ml||0)+(item.marselan_ml||0)+(item.syrah_ml||0);
    const cost = (item.cabernet_ml||0)/100*COST_XDL + (item.marselan_ml||0)/100*COST_HPN + (item.syrah_ml||0)/100*COST_MSL;
    const factory = cost/COST_RATIO;
    const retail = factory*RETAIL_MULT;
    const isScored = item.brand_score !== null && item.brand_score > 0;
    const statusClass = isScored ? 'scored' : 'submitted';
    const statusText = isScored ? '✅ 已评分' : '📝 待评分';

    return `
    <div class="team-card" id="card_${idx}">
      <div class="team-header">
        <span class="team-name">${item.teams?.name || '未知队伍'} · ${item.wine_name}</span>
        <span class="team-status ${statusClass}">${statusText}</span>
      </div>
      <div class="detail-grid">
        <div class="detail-item"><div class="dl">赤霞珠</div><div class="dv">${item.cabernet_ml} ml</div></div>
        <div class="detail-item"><div class="dl">马瑟兰</div><div class="dv">${item.marselan_ml} ml</div></div>
        <div class="detail-item"><div class="dl">西拉</div><div class="dv">${item.syrah_ml} ml</div></div>
        <div class="detail-item"><div class="dl">总用量</div><div class="dv">${totalMl} ml</div></div>
        <div class="detail-item"><div class="dl">基酒成本</div><div class="dv">${cost.toFixed(2)} 元</div></div>
        <div class="detail-item"><div class="dl">出厂价</div><div class="dv">${factory.toFixed(1)} 元</div></div>
        <div class="detail-item"><div class="dl">建议零售价</div><div class="dv">${retail.toFixed(0)} 元</div></div>
        <div class="detail-item"><div class="dl">定价</div><div class="dv" style="color:#f6d365;font-size:.9rem">${item.my_price} 元</div></div>
      </div>
      <div class="brand-section">
        <h4>🎨 品牌信息</h4>
        <p><b>定位：</b>${item.positioning || '--'}</p>
        <p><b>故事：</b>${item.brand_story || '--'}</p>
      </div>
      <div class="score-input-row">
        <label>📖 品牌分</label>
        <input type="number" id="brand_${idx}" min="0" max="10" step="0.5" value="${isScored ? item.brand_score : ''}" placeholder="0-10">
        <button class="save-btn" id="saveBtn_${idx}" onclick="saveBrandScore(${idx})" ${isScored?'':'disabled'}>
          ${isScored ? '已保存' : '输入分数'}
        </button>
        <div class="auto-scores">
          风险<span>${item.risk_score?.toFixed(1) || '--'}</span> · 
          定价<span>${item.pricing_score?.toFixed(1) || '--'}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  // 添加input监听，启用保存按钮
  data.forEach((item, idx) => {
    const input = document.getElementById('brand_' + idx);
    if (input) {
      input.addEventListener('input', function() {
        const val = parseFloat(this.value);
        const btn = document.getElementById('saveBtn_' + idx);
        btn.disabled = !(val >= 0 && val <= 10);
        if (btn.disabled) btn.textContent = '输入分数';
        else btn.textContent = '保存';
      });
    }
  });
}

async function saveBrandScore(idx) {
  const item = submissionsData[idx];
  const score = parseFloat(document.getElementById('brand_' + idx).value);
  if (isNaN(score) || score < 0 || score > 10) return;

  const btn = document.getElementById('saveBtn_' + idx);
  btn.disabled = true;
  btn.textContent = '保存中...';

  const { error } = await supabase
    .from('submissions')
    .update({ brand_score: score, status: 'scored' })
    .eq('id', item.id);

  if (error) {
    alert('保存失败: ' + error.message);
    btn.disabled = false;
    btn.textContent = '重试';
    return;
  }

  btn.textContent = '✅ 已保存';
  item.brand_score = score;
  item.status = 'scored';

  // 更新状态标签
  const card = document.getElementById('card_' + idx);
  const statusEl = card.querySelector('.team-status');
  statusEl.className = 'team-status scored';
  statusEl.textContent = '✅ 已评分';

  // 重新计算排名
  renderRanking(submissionsData);
}

function renderRanking(data) {
  const scored = data.filter(d => d.brand_score !== null && d.brand_score > 0);
  if (scored.length === 0) {
    document.getElementById('rankSection').style.display = 'none';
    return;
  }
  document.getElementById('rankSection').style.display = 'block';

  // 计算利润
  const ranked = scored.map(d => {
    const cost = (d.cabernet_ml||0)/100*COST_XDL + (d.marselan_ml||0)/100*COST_HPN + (d.syrah_ml||0)/100*COST_MSL;
    const factory = cost / COST_RATIO;
    const retail = factory * RETAIL_MULT;
    const avg = (d.risk_score + d.pricing_score + d.brand_score) / 3;
    const demand = Math.round(avg * 100);
    const priceRatio = retail > 0 ? d.my_price / retail : 1;
    const feeRandom = d.pricing_self_score || 0;
    const feeRate = Math.max(0.70, Math.min(0.95, 0.85 + 0.08*(priceRatio-1) - 0.015*d.brand_score + feeRandom));
    const netProfit = (d.my_price - factory) * demand * (1 - feeRate);
    return { ...d, avg, demand, netProfit };
  }).sort((a, b) => b.netProfit - a.netProfit);

  const medals = ['🥇','🥈','🥉'];
  const rankClasses = ['rank-1','rank-2','rank-3'];

  document.getElementById('rankList').innerHTML = ranked.map((d, i) => {
    const rankClass = i < 3 ? rankClasses[i] : 'rank-other';
    const profitClass = d.netProfit >= 0 ? 'pos' : 'neg';
    return `
    <div class="rank-item">
      <div class="rank-num ${rankClass}">${i<3?medals[i]:i+1}</div>
      <div class="rank-info">
        <div class="rank-team">${d.teams?.name || '未知'} · ${d.wine_name}</div>
        <div class="rank-detail">均分${d.avg.toFixed(1)} · 需求${d.demand}瓶 · 品牌${d.brand_score?.toFixed(1)}</div>
      </div>
      <div class="rank-profit ${profitClass}">${d.netProfit.toFixed(0)}元</div>
    </div>`;
  }).join('');
}

loadSubmissions();
</script>
</body>
</html>
