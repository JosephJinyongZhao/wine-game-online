<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>调酒商业模拟 - 庄主</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:16px;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#0a1628 0%,#1a2744 50%,#0a1628 100%);color:#c8d8f0;line-height:1.5;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  .container{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;max-width:520px;width:100%;margin:0 auto;padding:14px 16px 14px}
  h1{text-align:center;font-size:1.2rem;margin-bottom:4px;background:linear-gradient(90deg,#f6d365,#fda085);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .subtitle{text-align:center;font-size:.72rem;color:#4a6a8a;margin-bottom:12px}
  /* Login */
  .login-overlay{position:fixed;inset:0;background:rgba(10,22,40,.95);z-index:200;display:flex;align-items:center;justify-content:center}
  .login-overlay.hide{display:none}
  .login-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:28px 22px;width:90%;max-width:340px;text-align:center}
  .login-box h2{color:#f6d365;font-size:1.1rem;margin-bottom:14px}
  .login-box input{width:100%;padding:11px;border:1px solid rgba(255,255,255,.15);border-radius:10px;background:rgba(255,255,255,.08);color:#fff;font-size:1rem;text-align:center;margin-bottom:10px;outline:none}
  .login-box input:focus{border-color:#f6d365}
  .login-box button{width:100%;padding:11px;border:none;border-radius:10px;background:linear-gradient(135deg,#f6d365,#fda085);color:#1a0a2e;font-size:1rem;font-weight:700;cursor:pointer}
  .login-box .err{color:#ff6b6b;font-size:.78rem;margin-top:6px;display:none}
  .login-hint{font-size:.7rem;color:#4a6a8a;margin-top:10px}
  /* Tab bar */
  .tab-bar{display:flex;background:rgba(255,255,255,.04);border-top:1px solid rgba(255,255,255,.08);flex-shrink:0;padding:4px 0 env(safe-area-inset-bottom,4px)}
  .tab-item{flex:1;text-align:center;padding:6px 0 4px;cursor:pointer;color:#4a6a8a;font-size:.72rem;font-weight:500;transition:color .2s;position:relative}
  .tab-item .tab-icon{font-size:1.15rem;display:block;margin-bottom:1px}
  .tab-item.active{color:#f6d365;font-weight:700}
  .tab-item.active::before{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:#f6d365;border-radius:0 0 2px 2px}
  .tab-panel{display:none}
  .tab-panel.active{display:block}
  /* Round tabs */
  .round-tabs{display:flex;gap:6px;margin-bottom:14px;justify-content:center}
  .round-tab{padding:7px 14px;border-radius:20px;font-size:.78rem;font-weight:600;cursor:pointer;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#4a6a8a;transition:all .2s}
  .round-tab.active{background:rgba(246,211,101,.15);border-color:#f6d365;color:#f6d365}
  /* Team management */
  .setup-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;margin-bottom:14px}
  .setup-box h3{font-size:.88rem;color:#f6d365;margin-bottom:10px}
  .setup-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
  .setup-row label{font-size:.78rem;color:#8a9ab5;white-space:nowrap}
  .setup-row input{width:56px;padding:7px;border:1px solid rgba(255,255,255,.15);border-radius:8px;background:rgba(255,255,255,.08);color:#fff;font-size:.88rem;text-align:center;outline:none}
  .setup-row button{padding:7px 14px;border:none;border-radius:8px;background:rgba(246,211,101,.2);color:#f6d365;font-size:.78rem;font-weight:600;cursor:pointer}
  .team-input-list{margin-bottom:10px}
  .team-input-row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
  .team-input-row .idx{width:22px;text-align:center;font-size:.78rem;color:#4a6a8a;font-weight:600}
  .team-input-row input{flex:1;padding:8px 10px;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:rgba(255,255,255,.06);color:#fff;font-size:.82rem;outline:none}
  .team-input-row input:focus{border-color:#f6d365}
  .btn-create{width:100%;padding:10px;border:none;border-radius:8px;background:linear-gradient(135deg,#f6d365,#fda085);color:#1a0a2e;font-size:.88rem;font-weight:700;cursor:pointer}
  .btn-create:disabled{opacity:.5;cursor:not-allowed}
  .team-list-manage{margin-top:14px}
  .team-manage-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:8px;margin-bottom:6px}
  .team-manage-item .t-name{font-size:.85rem;font-weight:600;color:#e8d5f5}
  .team-manage-item .t-status{font-size:.7rem;color:#4a6a8a}
  .btn-del{padding:4px 10px;border:none;border-radius:6px;background:rgba(255,107,107,.15);color:#ff6b6b;font-size:.72rem;cursor:pointer}
  /* Team cards for scoring */
  .team-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px;margin-bottom:10px}
  .team-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .team-name{font-size:.95rem;font-weight:700;color:#f6d365}
  .team-status{font-size:.7rem;padding:3px 7px;border-radius:6px;font-weight:600}
  .team-status.submitted{background:rgba(255,193,7,.15);color:#ffc107}
  .team-status.scored{background:rgba(76,175,80,.15);color:#81c784}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
  .detail-item{font-size:.75rem;padding:5px 7px;background:rgba(255,255,255,.03);border-radius:6px}
  .detail-item .dl{color:#4a6a8a;font-size:.66rem}
  .detail-item .dv{color:#c8d8f0;font-weight:500}
  .brand-section{background:rgba(255,255,255,.03);border-radius:8px;padding:8px;margin-bottom:10px}
  .brand-section h4{font-size:.75rem;color:#a78bfa;margin-bottom:4px}
  .brand-section p{font-size:.75rem;color:#8a9ab5;line-height:1.4}
  .score-input-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid rgba(255,255,255,.06);flex-wrap:wrap}
  .score-input-row label{font-size:.8rem;color:#c8d8f0;font-weight:600;white-space:nowrap}
  .score-input-row input[type="number"]{width:64px;padding:7px;border:1px solid rgba(255,255,255,.15);border-radius:8px;background:rgba(255,255,255,.08);color:#f6d365;font-size:.95rem;font-weight:700;text-align:center;outline:none}
  .score-input-row .save-btn{padding:7px 14px;border:none;border-radius:8px;background:linear-gradient(135deg,#f6d365,#fda085);color:#1a0a2e;font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap}
  .score-input-row .save-btn:disabled{opacity:.5;cursor:not-allowed}
  .score-input-row .auto-scores{font-size:.7rem;color:#4a6a8a;width:100%}
  .score-input-row .auto-scores span{color:#81c784;font-weight:600}
  /* Ranking */
  .rank-section{margin-top:16px}
  .rank-section h3{text-align:center;font-size:.88rem;color:#f6d365;margin-bottom:10px}
  .rank-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,.03);border-radius:10px;margin-bottom:5px}
  .rank-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0}
  .rank-1{background:linear-gradient(135deg,#f6d365,#fda085);color:#1a0a2e}
  .rank-2{background:linear-gradient(135deg,#a8a8a8,#c0c0c0);color:#333}
  .rank-3{background:linear-gradient(135deg,#cd7f32,#daa520);color:#333}
  .rank-other{background:rgba(255,255,255,.08);color:#4a6a8a}
  .rank-info{flex:1}
  .rank-team{font-size:.82rem;font-weight:600;color:#e8d5f5}
  .rank-detail{font-size:.68rem;color:#4a6a8a}
  .rank-profit{text-align:right;font-size:.88rem;font-weight:700}
  .rank-profit.pos{color:#81c784}
  .rank-profit.neg{color:#ff6b6b}
  .empty{text-align:center;padding:30px 16px;color:#4a6a8a}
  .empty p{margin-top:4px;font-size:.78rem}
  .btn-row{display:flex;gap:8px;margin-top:14px}
  .btn-row button{flex:1;padding:10px;border:none;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer}
  .btn-refresh{background:rgba(255,255,255,.06);color:#c8d8f0;border:1px solid rgba(255,255,255,.1)}
  .btn-nav{background:rgba(167,139,250,.12);color:#a78bfa;border:1px solid rgba(167,139,250,.2);text-decoration:none;text-align:center}
</style>
</head>
<body>

<!-- Login -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>👑 庄主登录</h2>
    <input type="password" id="loginPwd" placeholder="输入庄主密码" onkeypress="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">登录</button>
    <p class="err" id="loginErr">密码错误</p>
    <p class="login-hint" id="loginHint"></p>
  </div>
</div>

<!-- Content -->
<div class="container">
  <h1>👑 庄主控制台</h1>
  <p class="subtitle">管理队伍 · 打分 · 查看排名</p>

  <!-- Tab: 队伍管理 -->
  <div class="tab-panel active" id="panel-manage">
    <div class="setup-box">
      <h3>📋 创建参赛队伍</h3>
      <div id="setupArea">
        <div class="setup-row">
          <label>队伍数量</label>
          <input type="number" id="teamCount" min="2" max="12" value="4">
          <button onclick="genTeamInputs()">下一步</button>
        </div>
      </div>
      <div id="teamInputArea"></div>
    </div>
    <div class="team-list-manage" id="teamListManage"></div>
  </div>

  <!-- Tab: 打分 -->
  <div class="tab-panel" id="panel-score">
    <div class="round-tabs">
      <div class="round-tab active" onclick="switchRound(1)">第1轮</div>
      <div class="round-tab" onclick="switchRound(2)">第2轮</div>
      <div class="round-tab" onclick="switchRound(3)">第3轮</div>
    </div>
    <div id="teamList"></div>
    <div class="rank-section" id="rankSection" style="display:none">
      <h3>🏅 当前轮次排名</h3>
      <div id="rankList"></div>
    </div>
    <div class="btn-row">
      <button class="btn-refresh" onclick="loadSubmissions()">🔄 刷新</button>
      <a class="btn-nav" href="board.html">🏆 排行榜</a>
    </div>
  </div>
</div>

<!-- Bottom tab bar -->
<div class="tab-bar">
  <div class="tab-item active" onclick="switchTab('manage')"><span class="tab-icon">📋</span>队伍管理</div>
  <div class="tab-item" onclick="switchTab('score')"><span class="tab-icon">🎯</span>打分</div>
</div>

<script>
// ====== Supabase init ======
let supabase = null;
let sdkReady = false;
try {
  if (window.supabase && window.supabase.createClient) {
    supabase = window.supabase.createClient(
      'https://br-super-bril-5b7143a3.supabase.aidap-global.cn-beijing.volces.com',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1wbGF0Zm9ybSIsInJvbGUiOiJhbm9uIiwiZXhwIjozNjgwMzAwODk3fQ.iQvJdU1h7O0HqW_QK9U-LrEL4iz2j2uwL3HYaXTS1z0'
    );
    sdkReady = true;
  }
} catch(e) { console.error('Supabase init failed:', e); }

if (!sdkReady) {
  document.getElementById('loginHint').textContent = '⚠️ 数据库连接失败，请刷新页面重试';
  document.getElementById('loginHint').style.color = '#ff6b6b';
}

// ====== Constants ======
const JUDGE_PWD = 'wine2026';
const COST_XDL=3, COST_HPN=7, COST_MSL=4.8, COST_RATIO=0.4, RETAIL_MULT=3;

let currentRound = 1;
let submissionsData = [];
let isLoggedIn = false;

// ====== Login ======
function doLogin() {
  const pwd = document.getElementById('loginPwd').value;
  if (pwd === JUDGE_PWD) {
    document.getElementById('loginOverlay').classList.add('hide');
    isLoggedIn = true;
    initAfterLogin();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

function initAfterLogin() {
  loadTeamsManage();
  loadSubmissions();
}

// ====== Tab switching ======
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  const idx = { manage: 0, score: 1 }[name];
  document.querySelectorAll('.tab-item')[idx].classList.add('active');
  document.querySelector('.container').scrollTop = 0;
}

// ====== Team management ======
async function loadTeamsManage() {
  if (!supabase) return;
  const { data } = await supabase.from('teams').select('*').order('created_at');
  const list = document.getElementById('teamListManage');

  if (!data || data.length === 0) {
    list.innerHTML = '<div class="empty"><p>暂无队伍</p><p>请先在上方创建参赛队伍</p></div>';
    return;
  }

  // Fetch submission counts per team
  const { data: subs } = await supabase.from('submissions').select('team_id, round, status');
  const teamStats = {};
  data.forEach(t => { teamStats[t.id] = { rounds: new Set(), scored: 0 }; });
  if (subs) {
    subs.forEach(s => {
      if (teamStats[s.team_id]) {
        teamStats[s.team_id].rounds.add(s.round);
        if (s.status === 'scored') teamStats[s.team_id].scored++;
      }
    });
  }

  list.innerHTML = '<h3 style="font-size:.85rem;color:#f6d365;margin-bottom:8px">已创建的队伍（' + data.length + '）</h3>' +
  data.map(t => {
    const stats = teamStats[t.id] || { rounds: new Set(), scored: 0 };
    const roundInfo = stats.rounds.size > 0 ? '已提交' + stats.rounds.size + '轮' : '未提交';
    return `
    <div class="team-manage-item">
      <div>
        <div class="t-name">${t.name}</div>
        <div class="t-status">${roundInfo}</div>
      </div>
      <button class="btn-del" onclick="deleteTeam('${t.id}','${t.name}')">删除</button>
    </div>`;
  }).join('');
}

function genTeamInputs() {
  const count = Math.max(2, Math.min(12, +document.getElementById('teamCount').value || 4));
  const area = document.getElementById('teamInputArea');
  let html = '<div class="team-input-list">';
  for (let i = 1; i <= count; i++) {
    html += `<div class="team-input-row"><span class="idx">${i}</span><input type="text" id="ti_${i}" placeholder="第${i}队名称"></div>`;
  }
  html += '</div><button class="btn-create" id="createAllBtn" onclick="createAllTeams()">✅ 批量创建</button>';
  area.innerHTML = html;
}

async function createAllTeams() {
  if (!supabase) { alert('数据库未连接'); return; }
  const btn = document.getElementById('createAllBtn');
  btn.disabled = true;
  btn.textContent = '创建中...';

  const inputs = document.querySelectorAll('.team-input-list input');
  const names = [];
  for (const input of inputs) {
    const name = input.value.trim();
    if (name) names.push(name);
  }

  if (names.length === 0) {
    alert('请至少输入一个队名');
    btn.disabled = false;
    btn.textContent = '✅ 批量创建';
    return;
  }

  let created = 0, skipped = 0, errors = [];
  for (const name of names) {
    const { error } = await supabase.from('teams').insert({ name });
    if (error) {
      if (error.message && error.message.includes('duplicate')) {
        skipped++;
      } else {
        errors.push(name + ': ' + error.message);
      }
    } else {
      created++;
    }
  }

  btn.disabled = false;
  btn.textContent = '✅ 批量创建';

  let msg = `创建完成：${created}个队伍`;
  if (skipped > 0) msg += `，${skipped}个重名跳过`;
  if (errors.length > 0) msg += `\n失败：${errors.join(', ')}`;
  alert(msg);

  document.getElementById('teamInputArea').innerHTML = '';
  loadTeamsManage();
}

async function deleteTeam(id, name) {
  if (!supabase) return;
  if (!confirm(`确定删除队伍「${name}」吗？\n该队伍的提交记录也会受影响。`)) return;

  // Delete submissions first
  await supabase.from('submissions').delete().eq('team_id', id);
  const { error } = await supabase.from('teams').delete().eq('id', id);

  if (error) {
    alert('删除失败: ' + error.message);
  } else {
    loadTeamsManage();
    loadSubmissions();
  }
}

// ====== Scoring ======
function switchRound(r) {
  currentRound = r;
  document.querySelectorAll('.round-tab').forEach((el,i) => el.classList.toggle('active', i+1===r));
  loadSubmissions();
}

async function loadSubmissions() {
  if (!supabase) return;
  const list = document.getElementById('teamList');
  list.innerHTML = '<div class="empty">加载中...</div>';

  const { data, error } = await supabase
    .from('submissions')
    .select('*, teams(name)')
    .eq('round', currentRound)
    .order('submitted_at', { ascending: true });

  if (error) {
    list.innerHTML = `<div class="empty">加载失败：${error.message}</div>`;
    return;
  }

  if (!data || data.length === 0) {
    list.innerHTML = '<div class="empty"><p>🍷 暂无提交</p><p>等待队伍提交决策...</p></div>';
    document.getElementById('rankSection').style.display = 'none';
    return;
  }

  submissionsData = data;
  renderTeams(data);
  renderRanking(data);
}

function renderTeams(data) {
  const list = document.getElementById('teamList');
  list.innerHTML = data.map((item, idx) => {
    const totalMl = (item.cabernet_ml||0)+(item.marselan_ml||0)+(item.syrah_ml||0);
    const cost = (item.cabernet_ml||0)/100*COST_XDL + (item.marselan_ml||0)/100*COST_HPN + (item.syrah_ml||0)/100*COST_MSL;
    const factory = cost/COST_RATIO;
    const retail = factory*RETAIL_MULT;
    const isScored = item.brand_score !== null && item.brand_score > 0;
    const statusClass = isScored ? 'scored' : 'submitted';
    const statusText = isScored ? '✅ 已评分' : '📝 待评分';

    return `
    <div class="team-card" id="card_${idx}">
      <div class="team-header">
        <span class="team-name">${item.teams?.name || '未知'} · ${item.wine_name}</span>
        <span class="team-status ${statusClass}">${statusText}</span>
      </div>
      <div class="detail-grid">
        <div class="detail-item"><div class="dl">赤霞珠</div><div class="dv">${item.cabernet_ml} ml</div></div>
        <div class="detail-item"><div class="dl">马瑟兰</div><div class="dv">${item.marselan_ml} ml</div></div>
        <div class="detail-item"><div class="dl">西拉</div><div class="dv">${item.syrah_ml} ml</div></div>
        <div class="detail-item"><div class="dl">总用量</div><div class="dv">${totalMl} ml</div></div>
        <div class="detail-item"><div class="dl">基酒成本</div><div class="dv">${cost.toFixed(2)} 元</div></div>
        <div class="detail-item"><div class="dl">出厂价</div><div class="dv">${factory.toFixed(1)} 元</div></div>
        <div class="detail-item"><div class="dl">建议零售价</div><div class="dv">${retail.toFixed(0)} 元</div></div>
        <div class="detail-item"><div class="dl">定价</div><div class="dv" style="color:#f6d365;font-size:.88rem">${item.my_price} 元</div></div>
      </div>
      <div class="brand-section">
        <h4>🎨 品牌信息</h4>
        <p><b>定位：</b>${item.positioning || '--'}</p>
        <p><b>故事：</b>${item.brand_story || '--'}</p>
      </div>
      <div class="score-input-row">
        <label>📖 品牌分</label>
        <input type="number" id="brand_${idx}" min="0" max="10" step="0.5" value="${isScored ? item.brand_score : ''}" placeholder="0-10">
        <button class="save-btn" id="saveBtn_${idx}" onclick="saveBrandScore(${idx})" ${isScored?'':'disabled'}>
          ${isScored ? '已保存' : '输入分数'}
        </button>
        <div class="auto-scores">
          风险<span>${item.risk_score?.toFixed(1) || '--'}</span> · 
          定价<span>${item.pricing_score?.toFixed(1) || '--'}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  data.forEach((item, idx) => {
    const input = document.getElementById('brand_' + idx);
    if (input) {
      input.addEventListener('input', function() {
        const val = parseFloat(this.value);
        const btn = document.getElementById('saveBtn_' + idx);
        btn.disabled = !(val >= 0 && val <= 10);
        if (btn.disabled) btn.textContent = '输入分数';
        else btn.textContent = '保存';
      });
    }
  });
}

async function saveBrandScore(idx) {
  const item = submissionsData[idx];
  const score = parseFloat(document.getElementById('brand_' + idx).value);
  if (isNaN(score) || score < 0 || score > 10) return;

  const btn = document.getElementById('saveBtn_' + idx);
  btn.disabled = true;
  btn.textContent = '保存中...';

  const { error } = await supabase
    .from('submissions')
    .update({ brand_score: score, status: 'scored' })
    .eq('id', item.id);

  if (error) {
    alert('保存失败: ' + error.message);
    btn.disabled = false;
    btn.textContent = '重试';
    return;
  }

  btn.textContent = '✅ 已保存';
  item.brand_score = score;
  item.status = 'scored';

  const card = document.getElementById('card_' + idx);
  const statusEl = card.querySelector('.team-status');
  statusEl.className = 'team-status scored';
  statusEl.textContent = '✅ 已评分';

  renderRanking(submissionsData);
}

function renderRanking(data) {
  const scored = data.filter(d => d.brand_score !== null && d.brand_score > 0);
  if (scored.length === 0) {
    document.getElementById('rankSection').style.display = 'none';
    return;
  }
  document.getElementById('rankSection').style.display = 'block';

  const ranked = scored.map(d => {
    const cost = (d.cabernet_ml||0)/100*COST_XDL + (d.marselan_ml||0)/100*COST_HPN + (d.syrah_ml||0)/100*COST_MSL;
    const factory = cost / COST_RATIO;
    const retail = factory * RETAIL_MULT;
    const avg = (d.risk_score + d.pricing_score + d.brand_score) / 3;
    const demand = Math.round(avg * 100);
    const priceRatio = retail > 0 ? d.my_price / retail : 1;
    const feeRandom = (d.pricing_self_score || 0.03) - 0.03; // 减去偏移
    const feeRate = Math.max(0.70, Math.min(0.95, 0.85 + 0.08*(priceRatio-1) - 0.015*d.brand_score + feeRandom));
    const netProfit = (d.my_price - factory) * demand * (1 - feeRate);
    return { ...d, avg, demand, netProfit };
  }).sort((a, b) => b.netProfit - a.netProfit);

  const medals = ['🥇','🥈','🥉'];
  const rankClasses = ['rank-1','rank-2','rank-3'];

  document.getElementById('rankList').innerHTML = ranked.map((d, i) => {
    const rankClass = i < 3 ? rankClasses[i] : 'rank-other';
    const profitClass = d.netProfit >= 0 ? 'pos' : 'neg';
    return `
    <div class="rank-item">
      <div class="rank-num ${rankClass}">${i<3?medals[i]:i+1}</div>
      <div class="rank-info">
        <div class="rank-team">${d.teams?.name || '未知'} · ${d.wine_name}</div>
        <div class="rank-detail">均分${d.avg.toFixed(1)} · 需求${d.demand}瓶 · 品牌${d.brand_score?.toFixed(1)}</div>
      </div>
      <div class="rank-profit ${profitClass}">${d.netProfit.toFixed(0)}元</div>
    </div>`;
  }).join('');
}

// ====== Init ======
async function init() {
  if (!sdkReady) return;
  // Don't auto-load before login to avoid issues with sleeping DB
}
</script>
